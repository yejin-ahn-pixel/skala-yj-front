<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Gowun+Batang&family=Nanum+Gothic:wght@400;700&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
    <h1>회원가입</h1>
    <p>SKALA-FRONT 회원가입을 환영합니다.</p>
    <form method="get" action="signUpResult.html">
        <fieldset>
            <legend>계정 정보</legend>
            <p>
                <label class="form-label" for="userID">아이디</label>
                <input type="text" id="userID" name="userID" minlength="4" maxlength="15" required placeholder="4~15자 한글/영문/숫자">
                <small>(필수)</small>
            </p>
            <p>
                <label class="form-label" for="userPw">비밀번호</label>
                <input type="password" id="userPw" name="userPw" minlength="8" required placeholder="8자 이상 입력">
                <small>(필수)</small>
            </p>
            <p>
                <label class="form-label" for="userEmail">이메일</label>
                <span class="email-inputs">
                    <input type="text" id="userEmail" name="userEmail" placeholder="example">
                    <span>@</span>
                    <select name="emailDomain" aria-label="이메일 도메인">
                        <option value="direct">직접 입력</option>
                        <option value="naver.com">naver.com</option>
                        <option value="gmail.com">gmail.com</option>
                        <option value="daum.net">daum.net</option>
                    </select>
                    <small>(필수)</small>
                </span>
            </p>
        </fieldset>

        <fieldset>
            <legend>개인 프로필 정보</legend>
            <p>
                <label class="form-label" for="userName">이름</label>
                <input type="text" id="userName" name="userName" minlength="2" maxlength="10">
                <small>(필수)</small>
            </p>
            <p>
                <label class="form-label" for="userBirth">생년월일</label>
                <input type="date" id="userBirth" name="userBirth">
                <small>(필수)</small>
            </p>
            <p>
                <span class="form-label">성별</span>
                <label><input type="radio" name="gender" value="male" checked> 남성</label>
                <label><input type="radio" name="gender" value="female"> 여성</label>
                <label><input type="radio" name="gender" value="none"> 선택안함</label>
            </p>
            <p>
                <span class="form-label">관심 분야 (중복 선택 가능)</span>
                <label><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label><br>
                <label><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label><br>
                <label><input type="checkbox" name="interest" value="backend"> 백엔드 & 데이터베이스</label><br>
                <label><input type="checkbox" name="interest" value="devops"> 클라우드 & 인프라</label>
            </p>
        </fieldset>

        <fieldset>
            <legend>자기소개</legend>
            <p>
                <label class="form-label" for="intro">나를 표현하는 한 줄 소개 또는 가입 인사</label>
                <textarea id="intro" name="intro" rows="5" cols="50" maxlength="200" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
            </p>
        </fieldset>

        <div class="form-actions">
            <input type="submit" value="동의하고 회원가입">
            <input type="reset" value="다시 작성">
            <a href="index.html">메인으로 돌아가기</a>
        </div>
    </form>
    </div>
</body>
</html>
